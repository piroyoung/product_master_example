name: CD

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy tagged image to Azure Container Apps
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name "${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}"

      - name: Build and push image
        id: image
        env:
          ACR_LOGIN_SERVER: ${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
        run: |
          set -euo pipefail

          image_tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            image_tag="${GITHUB_SHA::12}"
          fi

          image="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${image_tag}"
          docker build --pull --tag "${image}" .
          docker push "${image}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Update Container App
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ steps.image.outputs.image }}"

      - name: Verify health endpoint
        env:
          APP_FQDN: ${{ vars.AZURE_CONTAINER_APP_FQDN }}
        run: |
          set -euo pipefail

          url="https://${APP_FQDN}/api/health"
          for _ in $(seq 1 30); do
            if curl --fail --silent --show-error "${url}"; then
              exit 0
            fi
            sleep 10
          done

          echo "Health check failed: ${url}" >&2
          exit 1
